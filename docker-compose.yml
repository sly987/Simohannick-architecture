services:
  db:
    image: postgres:17.2
    container_name: heuristicDB
    environment:
      POSTGRES_DB: heuristicDB
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - ./infrastructure/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./infrastructure/schema_data_dev.sql:/docker-entrypoint-initdb.d/02-data.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d heuristicDB"]
      interval: 5s
      timeout: 3s
      retries: 20

  db-init:
    image: postgres:17.2
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./infrastructure/schema.sql:/scripts/01-schema.sql:ro
      - ./infrastructure/schema_data_dev.sql:/scripts/02-data.sql:ro
    environment:
      PGPASSWORD: admin123
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "psql -h db -U admin -d heuristicDB -f /scripts/01-schema.sql &&
       psql -h db -U admin -d heuristicDB -f /scripts/02-data.sql"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: reseking-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics ping" ]
      interval: 5s
      timeout: 5s
      retries: 20

  mailhog:
    image: mailhog/mailhog
    container_name: reseking-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8025 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend/module/Reseking
    container_name: reseking-back
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/heuristicDB
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123

      SECURITY_JWT_SECRET: j05RQDCPOhP1sLEk4W3BhCzjssDB08SX87aV49FFTQo=
      SECURITY_JWT_EXPIRATION_MINUTES: 120

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

    volumes:
      - ./data:/app/data

    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/Reseking
      args:
        VITE_API_URL: http://localhost:8080/api
    container_name: reseking-front
    ports:
      - "3000:80"
    depends_on:
      - backend

  notification:
    build: ./backend/module/reseking-notification
    container_name: reseking-notification
    ports:
      - "8040:8040"
    environment:
      SERVER_PORT: 8040

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_SMTP_AUTH: false
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: false

    depends_on:
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_healthy

volumes:
  postgres_data:
